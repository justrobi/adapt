<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FixMaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --or:#E8560A;--or2:#FF7235;--or-lt:#FFF3EE;--or-md:#FFD0B8;
  --dark:#111110;--dark2:#1C1A17;
  --white:#fff;--bg:#F7F5F2;--bg2:#EFEDE9;
  --txt:#1A1815;--txt2:#6B6258;--txt3:#A8A09A;
  --bdr:#E5E0D8;--bdr2:#D4CEC6;
  --grn:#16A34A;--grn-lt:#DCFCE7;
  --red:#DC2626;--red-lt:#FEE2E2;
  --blu:#1D4ED8;--blu-lt:#DBEAFE;
  --ylw:#CA8A04;--ylw-lt:#FEF9C3;
  --r:10px;--r2:16px;--r3:24px;--r4:100px;
  --sh:0 1px 8px rgba(0,0,0,.07);
  --sh2:0 4px 24px rgba(0,0,0,.11);
  --sh3:0 12px 48px rgba(0,0,0,.16);
}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Noto Sans Georgian','Inter',sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
#app{min-height:100vh}

/* ─── UTILS ─── */
.flex{display:flex}.flex-c{display:flex;flex-direction:column}.fc{align-items:center}.jc{justify-content:center}.jsb{justify-content:space-between}.gap4{gap:4px}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}.gap20{gap:20px}.gap24{gap:24px}
.w100{width:100%}.h100{height:100%}
.bold{font-weight:700}.bolder{font-weight:800}.boldest{font-weight:900}
.txt2{color:var(--txt2)}.txt3{color:var(--txt3)}.orange{color:var(--or)}
.s11{font-size:.68rem}.s12{font-size:.75rem}.s13{font-size:.81rem}.s14{font-size:.875rem}.s15{font-size:.94rem}.s16{font-size:1rem}.s18{font-size:1.125rem}.s20{font-size:1.25rem}.s24{font-size:1.5rem}.s28{font-size:1.75rem}.s32{font-size:2rem}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}.mt24{margin-top:24px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb24{margin-bottom:24px}
.p12{padding:12px}.p16{padding:16px}.p20{padding:20px}.p24{padding:24px}
.br{border-radius:var(--r)}.br2{border-radius:var(--r2)}.br3{border-radius:var(--r3)}.br4{border-radius:var(--r4)}
.card{background:var(--white);border:1px solid var(--bdr);border-radius:var(--r2);box-shadow:var(--sh)}
.card2{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r2)}
.hidden{display:none!important}
.lh16{line-height:1.6}.lh17{line-height:1.7}
.up{text-transform:uppercase}.ls{letter-spacing:.06em}
.ell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* badge */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:var(--r4);font-size:.68rem;font-weight:800}
.badge-or{background:var(--or-lt);color:var(--or)}.badge-grn{background:var(--grn-lt);color:var(--grn)}.badge-red{background:var(--red-lt);color:var(--red)}.badge-blu{background:var(--blu-lt);color:var(--blu)}.badge-ylw{background:var(--ylw-lt);color:var(--ylw)}.badge-txt{background:var(--bg2);color:var(--txt2)}
/* avatar */
.ava{display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:800;font-family:'Inter',sans-serif;flex-shrink:0;overflow:hidden}
.ava img{width:100%;height:100%;object-fit:cover}
.ava-or{background:linear-gradient(135deg,var(--or),var(--or2));color:#fff}
.ava-grn{background:var(--grn-lt);color:var(--grn)}
.ava-blu{background:var(--blu-lt);color:var(--blu)}
.ava32{width:32px;height:32px;font-size:.8rem}
.ava40{width:40px;height:40px;font-size:.9rem}
.ava48{width:48px;height:48px;font-size:1rem}
.ava56{width:56px;height:56px;font-size:1.1rem}
.ava80{width:80px;height:80px;font-size:1.6rem}
/* stars */
.stars{color:var(--or);letter-spacing:1px}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-family:'Noto Sans Georgian','Inter',sans-serif;font-weight:700;border-radius:var(--r);transition:all .2s}
.btn-primary{background:var(--or);color:#fff;padding:12px 22px;font-size:.875rem;box-shadow:0 4px 14px rgba(232,86,10,.28)}
.btn-primary:hover{background:#c9470a;transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,86,10,.38)}
.btn-ghost{background:#fff;color:var(--txt);padding:11px 20px;font-size:.875rem;border:1.5px solid var(--bdr)}
.btn-ghost:hover{border-color:var(--or);color:var(--or)}
.btn-danger{background:var(--red-lt);color:var(--red);padding:11px 20px;font-size:.875rem}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-grn{background:var(--grn);color:#fff;padding:12px 22px;font-size:.875rem}
.btn-grn:hover{background:#15803d}
.btn-pill{border-radius:var(--r4)}
.btn-full{width:100%}
.btn-sm{padding:8px 14px;font-size:.78rem}
.btn-xs{padding:5px 10px;font-size:.7rem}
.btn-icon{width:36px;height:36px;padding:0;border-radius:var(--r)}
.btn-lg{padding:14px 28px;font-size:.95rem}
.btn svg{width:16px;height:16px;flex-shrink:0}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* ─── FORM ELEMENTS ─── */
.f-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.f-label{font-size:.68rem;font-weight:800;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em}
.f-inp{width:100%;background:var(--bg);border:1.5px solid var(--bdr);border-radius:var(--r);padding:11px 13px;font-family:'Noto Sans Georgian','Inter',sans-serif;font-size:.875rem;color:var(--txt);outline:none;transition:border-color .2s,background .2s}
.f-inp:focus{border-color:var(--or);background:#fff}
.f-inp::placeholder{color:var(--txt3)}
.f-inp.err{border-color:var(--red);background:var(--red-lt)}
.f-inp-icon{position:relative}
.f-inp-icon .f-inp{padding-left:40px}
.f-inp-icon .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}
.f-inp-icon .ic svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.f-hint{font-size:.68rem;color:var(--txt3);margin-top:3px}
.f-err-msg{font-size:.68rem;color:var(--red);margin-top:3px}
select.f-inp option{background:#fff}
textarea.f-inp{resize:none;min-height:80px;line-height:1.5}
.f-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ─── OTP INPUT ─── */
.otp-wrap{display:flex;gap:8px;justify-content:center}
.otp-inp{width:44px;height:52px;text-align:center;font-size:1.3rem;font-weight:800;font-family:'Inter',sans-serif;background:var(--bg);border:1.5px solid var(--bdr);border-radius:var(--r);outline:none;transition:all .2s;color:var(--dark)}
.otp-inp:focus{border-color:var(--or);background:#fff;box-shadow:0 0 0 3px rgba(232,86,10,.12)}
.otp-inp.filled{border-color:var(--or);background:var(--or-lt)}

/* ─── DIVIDER ─── */
.divider{display:flex;align-items:center;gap:12px;margin:16px 0}
.divider span{font-size:.72rem;color:var(--txt3);white-space:nowrap;font-weight:600}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* ─── SOCIAL AUTH BTNS ─── */
.soc-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px;border-radius:var(--r);border:1.5px solid var(--bdr);background:#fff;cursor:pointer;font-size:.875rem;font-weight:600;color:var(--txt);transition:all .2s;font-family:'Noto Sans Georgian','Inter',sans-serif;margin-bottom:10px}
.soc-btn:hover{border-color:var(--bdr2);box-shadow:var(--sh)}
.soc-btn svg{width:20px;height:20px;flex-shrink:0}

/* ─── TABS ─── */
.tabs{display:flex;background:var(--bg2);border-radius:var(--r);padding:3px;gap:3px;margin-bottom:20px}
.tab-btn{flex:1;padding:9px;border-radius:calc(var(--r) - 2px);font-size:.82rem;font-weight:700;border:none;cursor:pointer;background:transparent;color:var(--txt2);transition:all .2s;font-family:'Noto Sans Georgian','Inter',sans-serif}
.tab-btn.active{background:#fff;color:var(--or);box-shadow:var(--sh)}

/* ─── CHIPS ─── */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:6px 13px;border-radius:var(--r4);font-size:.78rem;font-weight:600;border:1.5px solid var(--bdr);background:#fff;cursor:pointer;transition:all .2s;color:var(--txt2)}
.chip:hover{border-color:var(--or);color:var(--or)}
.chip.sel{background:var(--or-lt);border-color:var(--or);color:var(--or)}

/* ─── STAT CARDS ─── */
.stat-card{background:#fff;border:1px solid var(--bdr);border-radius:var(--r2);padding:16px;box-shadow:var(--sh)}
.stat-n{font-family:'Inter',sans-serif;font-size:1.8rem;font-weight:900;line-height:1;color:var(--dark)}
.stat-n.or{color:var(--or)}
.stat-l{font-size:.7rem;color:var(--txt3);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.stat-trend{font-size:.68rem;font-weight:700;margin-top:6px}
.stat-trend.up{color:var(--grn)}.stat-trend.dn{color:var(--red)}

/* ─── JOB CARD ─── */
.job-card{background:#fff;border:1.5px solid var(--bdr);border-radius:var(--r2);padding:16px;cursor:pointer;transition:all .25s}
.job-card:hover{border-color:var(--or);box-shadow:var(--sh2);transform:translateY(-2px)}
.job-card.selected{border-color:var(--or);background:var(--or-lt)}
.jc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.jc-title{font-size:.92rem;font-weight:800;color:var(--dark);margin-bottom:3px}
.jc-sub{font-size:.75rem;color:var(--txt2)}
.jc-body{font-size:.82rem;color:var(--txt2);line-height:1.6;margin-bottom:10px}
.jc-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.jc-meta{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--txt3)}
.jc-meta svg{width:13px;height:13px;stroke:var(--txt3);fill:none;stroke-width:2;stroke-linecap:round}
.jc-price{font-size:1rem;font-weight:900;color:var(--or);font-family:'Inter',sans-serif}

/* ─── MASTER CARD ─── */
.master-card{background:#fff;border:1.5px solid var(--bdr);border-radius:var(--r2);padding:16px;cursor:pointer;transition:all .25s;display:flex;align-items:flex-start;gap:12px}
.master-card:hover{border-color:var(--or);box-shadow:var(--sh2)}
.mc-info{flex:1;min-width:0}
.mc-name{font-size:.92rem;font-weight:800;color:var(--dark)}
.mc-svc{font-size:.72rem;color:var(--txt2);margin-top:2px}
.mc-stars{display:flex;align-items:center;gap:4px;margin-top:6px}
.mc-stars svg{width:12px;height:12px;fill:var(--or);color:var(--or)}
.mc-star-n{font-size:.72rem;font-weight:700;color:var(--txt)}
.mc-rev-n{font-size:.68rem;color:var(--txt3)}
.mc-price{font-size:.8rem;font-weight:700;color:var(--grn)}

/* ─── TIMELINE / STATUS ─── */
.tl-item{display:flex;gap:12px;position:relative}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:15px;top:28px;bottom:-4px;width:1px;background:var(--bdr)}
.tl-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1}
.tl-dot svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.tl-or{background:var(--or)}.tl-grn{background:var(--grn)}.tl-gray{background:var(--bdr2)}.tl-blu{background:var(--blu)}
.tl-content{flex:1;padding-bottom:20px}
.tl-title{font-size:.85rem;font-weight:700;color:var(--txt)}
.tl-time{font-size:.68rem;color:var(--txt3);margin-top:2px}
.tl-desc{font-size:.78rem;color:var(--txt2);margin-top:4px;line-height:1.5}

/* ─── NOTICE / ALERT ─── */
.notice{border-radius:var(--r);padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.notice-or{background:var(--or-lt);border:1px solid var(--or-md)}.notice-grn{background:var(--grn-lt);border:1px solid #bbf7d0}.notice-red{background:var(--red-lt);border:1px solid #fecaca}.notice-blu{background:var(--blu-lt);border:1px solid #bfdbfe}
.notice svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}
.notice-or svg{stroke:var(--or)}.notice-grn svg{stroke:var(--grn)}.notice-red svg{stroke:var(--red)}.notice-blu svg{stroke:var(--blu)}
.notice p{font-size:.8rem;line-height:1.55}
.notice-or p{color:#92400e}.notice-grn p{color:#166534}.notice-red p{color:#991b1b}.notice-blu p{color:#1e3a8a}

/* ─── SPINNER ─── */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:24px;height:24px;border:2.5px solid var(--bdr);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite}
.spinner-sm{width:18px;height:18px;border-width:2px}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:var(--bg)}

/* ─── MODAL ─── */
.modal-bg{position:fixed;inset:0;background:rgba(17,17,16,.55);backdrop-filter:blur(6px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:1rem;animation:fadein .2s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:var(--r3);width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh3);animation:slideup .25s ease}
@keyframes slideup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.modal-head{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.modal-body{padding:20px 24px 24px}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt2);font-size:1rem;transition:all .2s}
.modal-close:hover{background:var(--bg2)}

/* ─── TOAST ─── */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{background:var(--dark);color:#fff;padding:10px 18px;border-radius:var(--r4);font-size:.82rem;font-weight:600;box-shadow:var(--sh3);animation:toast-in .3s ease;max-width:90vw;text-align:center}
.toast.grn{background:var(--grn)}.toast.red{background:var(--red)}.toast.or{background:var(--or)}
@keyframes toast-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes toast-out{from{opacity:1}to{opacity:0;transform:translateY(10px)}}

/* ═══════════════════════════════
   LANDING PAGE
═══════════════════════════════ */
.landing{background:var(--white);min-height:100vh}

/* ─── LANDING NAV ─── */
.l-nav{background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100;box-shadow:0 1px 10px rgba(0,0,0,.05)}
.l-nav-inner{max-width:1100px;margin:0 auto;padding:0 1.5rem;height:62px;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.l-nav-links{display:flex;list-style:none;gap:0}
.l-nav-links a{padding:0 13px;line-height:62px;font-size:.82rem;font-weight:500;color:var(--txt2);text-decoration:none;border-bottom:2px solid transparent;transition:all .2s}
.l-nav-links a:hover{color:var(--or);border-bottom-color:var(--or)}
.l-nav-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lang-sw{display:flex;background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r4);padding:2px;gap:2px}
.lbtn{padding:4px 10px;border-radius:var(--r4);font-size:.7rem;font-weight:800;cursor:pointer;border:none;background:transparent;color:var(--txt3);transition:all .2s;font-family:'Inter',sans-serif}
.lbtn.on{background:#fff;color:var(--or);box-shadow:var(--sh)}
.lbtn:hover:not(.on){color:var(--txt)}
.ham{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:4px}
.ham span{display:block;width:20px;height:2px;background:var(--txt);border-radius:2px}

/* ─── LANDING HERO ─── */
.l-hero{background:linear-gradient(160deg,#FFFAF7 0%,var(--bg) 60%,#ECE8E3 100%);padding:5rem 1.5rem 6rem;position:relative;overflow:hidden}
.l-hero-orb1{position:absolute;top:-150px;right:-100px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(232,86,10,.1),transparent 65%);pointer-events:none}
.l-hero-orb2{position:absolute;bottom:-200px;left:-80px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(232,86,10,.06),transparent 65%);pointer-events:none}
.l-hero-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center;position:relative;z-index:1}
.l-hero-pill{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--bdr);border-radius:var(--r4);padding:5px 13px 5px 7px;font-size:.7rem;font-weight:700;color:var(--txt2);box-shadow:var(--sh);margin-bottom:1.1rem}
.l-pill-dot{width:20px;height:20px;background:var(--or-lt);border-radius:50%;display:flex;align-items:center;justify-content:center}
.l-pill-dot::before{content:'';width:7px;height:7px;background:var(--or);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.l-hero-h{font-size:clamp(2.2rem,4vw,3.4rem);font-weight:900;line-height:1.1;letter-spacing:-.03em;color:var(--dark);margin-bottom:1rem}
.l-hero-p{font-size:.95rem;color:var(--txt2);line-height:1.7;max-width:430px;margin-bottom:1.5rem}
.l-hero-btns{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:2rem}
.l-hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
/* phone mockup */
.l-phone{position:relative;display:flex;justify-content:center}
.l-phone-shell{width:270px;background:#fff;border-radius:34px;box-shadow:var(--sh3),inset 0 0 0 1px rgba(0,0,0,.06);overflow:hidden;border:5px solid #fff;outline:1px solid var(--bdr)}
.l-ph-top{background:linear-gradient(135deg,var(--dark2),#2A2520);padding:18px 16px 22px;position:relative;overflow:hidden}
.l-ph-glow{position:absolute;top:-40px;right:-30px;width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,rgba(232,86,10,.25),transparent 65%)}
.l-ph-greeting{font-size:.62rem;color:rgba(255,255,255,.45);margin-bottom:1px;font-weight:500}
.l-ph-name{font-size:.92rem;font-weight:800;color:#fff;margin-bottom:10px}
.l-ph-search{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);border-radius:var(--r4);padding:8px 12px;display:flex;align-items:center;gap:6px}
.l-ph-search svg{width:12px;height:12px;stroke:rgba(255,255,255,.4);fill:none;stroke-width:2}
.l-ph-search span{font-size:.65rem;color:rgba(255,255,255,.35)}
.l-ph-body{padding:12px}
.l-ph-slab{font-size:.58rem;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px}
.l-ph-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.l-ph-svc{background:var(--bg);border-radius:10px;padding:8px 5px;text-align:center;border:1.5px solid transparent;transition:all .2s}
.l-ph-svc svg{display:block;margin:0 auto 4px}
.l-ph-svc span{font-size:.54rem;font-weight:700;color:var(--txt2);line-height:1.3}
.l-ph-job{background:linear-gradient(135deg,var(--or),var(--or2));border-radius:var(--r);padding:10px;display:flex;align-items:center;gap:8px;margin-bottom:8px}
.l-ph-job-ic{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.l-ph-job-ic svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.l-ph-job-t{font-size:.7rem;font-weight:800;color:#fff}
.l-ph-job-s{font-size:.58rem;color:rgba(255,255,255,.7);margin-top:1px}
.l-ph-job-tag{background:rgba(255,255,255,.25);color:#fff;font-size:.55rem;font-weight:800;padding:2px 6px;border-radius:var(--r4);margin-left:auto;flex-shrink:0}
/* float cards */
.fc{position:absolute;background:#fff;border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh2);padding:9px 11px;display:flex;align-items:center;gap:8px}
.fc.a1{top:-16px;right:-52px;animation:flt1 4s ease-in-out infinite}
.fc.a2{bottom:80px;right:-58px;animation:flt2 4s ease-in-out infinite}
.fc.a3{bottom:16px;left:-56px;animation:flt1 4s ease-in-out infinite .5s}
@keyframes flt1{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes flt2{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
.fc-ic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fc-ic.g{background:#dcfce7}.fc-ic.b{background:#dbeafe}.fc-ic.y{background:#fef9c3}
.fc-ic svg{width:14px;height:14px}
.fc-t{font-size:.68rem;font-weight:700;color:var(--txt);white-space:nowrap}
.fc-s{font-size:.6rem;color:var(--txt3);white-space:nowrap}

/* ─── HOW IT WORKS ─── */
.l-how{padding:5rem 1.5rem;background:#fff}
.l-how-inner{max-width:1100px;margin:0 auto}
.l-section-eye{display:inline-block;background:var(--or-lt);color:var(--or);border-radius:var(--r4);padding:4px 12px;font-size:.65rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.6rem}
.l-section-h{font-size:clamp(1.8rem,3vw,2.6rem);font-weight:900;letter-spacing:-.03em;color:var(--dark);line-height:1.1;margin-bottom:.6rem}
.l-section-p{font-size:.9rem;color:var(--txt2);max-width:460px;line-height:1.6}
.l-steps{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:2.5rem;position:relative}
.l-steps::before{content:'';position:absolute;top:28px;left:calc(12.5% + 18px);right:calc(12.5% + 18px);height:1px;background:repeating-linear-gradient(90deg,var(--or) 0,var(--or) 6px,transparent 6px,transparent 14px);opacity:.3}
.l-step{background:var(--bg);border-radius:var(--r2);padding:1.5rem 1.1rem;text-align:center;position:relative;z-index:1}
.l-step-num{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--or),var(--or2));margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(232,86,10,.3)}
.l-step-num svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.l-step-t{font-size:.9rem;font-weight:800;color:var(--dark);margin-bottom:.4rem}
.l-step-p{font-size:.75rem;color:var(--txt2);line-height:1.55}

/* ─── SERVICES ─── */
.l-svcs{padding:5rem 1.5rem;background:var(--bg)}
.l-svcs-inner{max-width:1100px;margin:0 auto}
.l-svcs-head{display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;flex-wrap:wrap;margin-bottom:2.5rem}
.l-svcs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.l-svc-card{background:#fff;border:1.5px solid var(--bdr);border-radius:var(--r2);padding:1.5rem;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.l-svc-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--or),var(--or2));opacity:0;transition:opacity .3s}
.l-svc-card:hover{transform:translateY(-3px);box-shadow:var(--sh3);border-color:transparent}
.l-svc-card:hover::after{opacity:1}
.l-svc-card>*{position:relative;z-index:1}
.l-svc-card:hover .l-svc-t,.l-svc-card:hover .l-svc-d,.l-svc-card:hover .l-svc-lnk{color:#fff!important}
.l-svc-card:hover .l-svc-ico{background:rgba(255,255,255,.2)!important}
.l-svc-ico{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:1rem;transition:background .3s}
.l-svc-t{font-size:.95rem;font-weight:800;color:var(--dark);margin-bottom:.4rem;transition:color .3s}
.l-svc-d{font-size:.78rem;color:var(--txt2);line-height:1.55;margin-bottom:.75rem;transition:color .3s}
.l-svc-lnk{font-size:.72rem;font-weight:800;color:var(--or);display:inline-flex;align-items:center;gap:4px;transition:color .3s}
.l-svc-lnk svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* ─── CTA STRIP ─── */
.l-cta{background:linear-gradient(135deg,var(--dark2),var(--dark));padding:4rem 1.5rem;text-align:center}
.l-cta-inner{max-width:640px;margin:0 auto}
.l-cta h2{font-size:clamp(1.8rem,3vw,2.4rem);font-weight:900;color:#fff;letter-spacing:-.03em;line-height:1.15;margin-bottom:.75rem}
.l-cta p{font-size:.9rem;color:rgba(255,255,255,.45);margin-bottom:1.75rem}
.l-cta-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ─── FOOTER ─── */
.l-footer{background:var(--dark);padding:3rem 1.5rem 0}
.l-footer-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:2.5rem;padding-bottom:2.5rem;border-bottom:1px solid rgba(255,255,255,.07)}
.lf-brand p{font-size:.78rem;color:rgba(255,255,255,.33);margin-top:.8rem;line-height:1.7;max-width:200px}
.lf-soc{display:flex;gap:6px;margin-top:1rem}
.lf-sc{width:30px;height:30px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.36);text-decoration:none;font-size:.65rem;font-weight:800;transition:all .2s;font-family:'Inter',sans-serif}
.lf-sc:hover{background:var(--or);color:#fff;border-color:var(--or)}
.lf-col-t{font-size:.7rem;font-weight:800;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.09em;margin-bottom:1rem}
.lf-links{list-style:none;display:flex;flex-direction:column;gap:.48rem}
.lf-links a{font-size:.78rem;color:rgba(255,255,255,.32);text-decoration:none;transition:color .2s}
.lf-links a:hover{color:var(--or)}
.l-footer-bot{max-width:1100px;margin:0 auto;padding:1.1rem 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.l-footer-bot p{font-size:.68rem;color:rgba(255,255,255,.22)}
.l-footer-bot span{color:var(--or)}

/* ═══════════════════════════════
   AUTH SCREENS
═══════════════════════════════ */
.auth-page{min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
.auth-nav{background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--bdr);padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between}
.auth-content{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.auth-card{background:#fff;border-radius:var(--r3);width:100%;max-width:420px;padding:2rem;box-shadow:var(--sh3)}
.auth-logo{display:flex;align-items:center;gap:9px;text-decoration:none;margin-bottom:1.5rem}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--or),var(--or2));border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(232,86,10,.28);flex-shrink:0}
.logo-mark svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-name{font-family:'Inter',sans-serif;font-size:1.1rem;font-weight:800;color:var(--dark);letter-spacing:-.03em}
.logo-name span{color:var(--or)}
.auth-h{font-size:1.4rem;font-weight:900;color:var(--dark);margin-bottom:.3rem;letter-spacing:-.02em}
.auth-sub{font-size:.82rem;color:var(--txt2);margin-bottom:1.5rem}
.auth-role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
.auth-role-card{background:var(--bg);border:2px solid var(--bdr);border-radius:var(--r2);padding:1.25rem;cursor:pointer;transition:all .2s;text-align:center}
.auth-role-card:hover{border-color:var(--or-md)}
.auth-role-card.sel{border-color:var(--or);background:var(--or-lt)}
.arc-ico{width:48px;height:48px;border-radius:14px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center}
.arc-t{font-size:.88rem;font-weight:800;color:var(--dark);margin-bottom:3px}
.arc-s{font-size:.7rem;color:var(--txt2);line-height:1.4}
/* phone verify screen */
.otp-screen{}
.phone-display{background:var(--bg);border-radius:var(--r);padding:12px;text-align:center;margin-bottom:1rem;font-size:.9rem;font-weight:700;color:var(--txt)}
.otp-hint{font-size:.75rem;color:var(--txt2);text-align:center;margin-bottom:1.25rem;line-height:1.5}
.resend-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px}
.resend-btn{background:none;border:none;cursor:pointer;color:var(--or);font-size:.78rem;font-weight:700;font-family:'Noto Sans Georgian','Inter',sans-serif}
.resend-btn:disabled{color:var(--txt3);cursor:default}
.resend-count{font-size:.78rem;color:var(--txt3)}

/* ═══════════════════════════════
   DASHBOARD SHELL
═══════════════════════════════ */
.dash{display:flex;min-height:100vh;background:var(--bg)}

/* sidebar */
.dash-side{
  width:240px;flex-shrink:0;
  background:#fff;border-right:1px solid var(--bdr);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:50;
  transition:transform .3s;
}
.ds-top{padding:20px 16px 16px;border-bottom:1px solid var(--bdr)}
.ds-user{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--r);cursor:pointer;transition:background .2s;text-decoration:none;margin-top:8px}
.ds-user:hover{background:var(--bg)}
.ds-user-info{flex:1;min-width:0}
.ds-user-name{font-size:.82rem;font-weight:800;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ds-user-role{font-size:.65rem;color:var(--txt3);margin-top:1px}
.ds-nav{flex:1;padding:10px 8px;overflow-y:auto}
.ds-nav-section{font-size:.6rem;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;padding:10px 8px 5px;margin-top:6px}
.ds-nav a{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:var(--r);font-size:.82rem;font-weight:600;color:var(--txt2);text-decoration:none;transition:all .2s;margin-bottom:2px;position:relative}
.ds-nav a svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.ds-nav a:hover{background:var(--bg);color:var(--txt)}
.ds-nav a.active{background:var(--or-lt);color:var(--or);font-weight:800}
.ds-nav a.active svg{stroke:var(--or)}
.ds-badge{background:var(--or);color:#fff;font-size:.58rem;font-weight:800;padding:1px 5px;border-radius:var(--r4);margin-left:auto;font-family:'Inter',sans-serif}
.ds-bottom{padding:12px 8px;border-top:1px solid var(--bdr)}
.ds-logout{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--r);font-size:.82rem;font-weight:600;color:var(--txt3);cursor:pointer;transition:all .2s;width:100%;background:none;border:none;font-family:'Noto Sans Georgian','Inter',sans-serif}
.ds-logout:hover{background:var(--red-lt);color:var(--red)}
.ds-logout svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* main content */
.dash-main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.dash-topbar{background:#fff;border-bottom:1px solid var(--bdr);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;flex-shrink:0}
.dash-topbar-l{display:flex;align-items:center;gap:12px}
.dash-topbar-r{display:flex;align-items:center;gap:8px}
.dash-page-title{font-size:.95rem;font-weight:800;color:var(--dark)}
.notif-btn{width:36px;height:36px;border-radius:var(--r);background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt2);transition:all .2s;position:relative}
.notif-btn:hover{background:var(--bg2)}
.notif-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--or);border-radius:50%;border:1.5px solid #fff}
.dash-content{padding:1.5rem;flex:1;max-width:1000px}
.dash-h{font-size:1.3rem;font-weight:900;color:var(--dark);margin-bottom:.3rem;letter-spacing:-.02em}
.dash-p{font-size:.85rem;color:var(--txt2);margin-bottom:1.5rem}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.section-title{font-size:.9rem;font-weight:800;color:var(--dark)}

/* mobile nav */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--bdr);z-index:50;padding:8px 0 max(8px,env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.mob-nav-inner{display:flex;align-items:center;justify-content:space-around}
.mob-nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 14px;border:none;background:transparent;cursor:pointer;color:var(--txt3);transition:all .2s;position:relative;font-family:'Noto Sans Georgian','Inter',sans-serif}
.mob-nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mob-nav-btn span{font-size:.58rem;font-weight:700}
.mob-nav-btn.active{color:var(--or)}
.mob-nav-badge{position:absolute;top:4px;right:10px;width:7px;height:7px;background:var(--or);border-radius:50%;border:1.5px solid #fff}
.mob-topbar{display:none;background:#fff;border-bottom:1px solid var(--bdr);padding:0 1rem;height:54px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.mob-menu-btn{width:34px;height:34px;border-radius:var(--r);background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mob-menu-btn svg{width:17px;height:17px;stroke:var(--txt);fill:none;stroke-width:2}
.mob-drawer-bg{display:none;position:fixed;inset:0;background:rgba(17,17,16,.5);z-index:200;backdrop-filter:blur(4px)}
.mob-drawer{position:fixed;left:0;top:0;bottom:0;width:min(280px,85vw);background:#fff;z-index:201;transform:translateX(-100%);transition:transform .3s;overflow-y:auto;box-shadow:var(--sh3)}
.mob-drawer.open{transform:none}

/* ─── RESPONSIVE DASH ─── */
@media(max-width:900px){
  .dash-side{transform:translateX(-100%)}
  .dash-side.open{transform:none}
  .dash-main{margin-left:0}
  .mob-nav{display:flex}
  .mob-topbar{display:flex}
  .dash-topbar{display:none}
  .mob-drawer-bg.open{display:block}
  .dash-content{padding:1rem;padding-bottom:80px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}

/* ─── RESPONSIVE LANDING ─── */
@media(max-width:1024px){
  .l-svcs-grid{grid-template-columns:repeat(2,1fr)}
  .l-hero-inner{grid-template-columns:1fr;gap:2rem;padding:4rem 1.5rem 5rem}
  .l-phone{display:none}
  .l-footer-inner{grid-template-columns:1fr 1fr;gap:2rem}
}
@media(max-width:768px){
  .l-nav-links,.l-nav-links{display:none}
  .ham{display:flex}
  .l-svcs-grid{grid-template-columns:1fr}
  .l-steps{grid-template-columns:repeat(2,1fr)}
  .l-steps::before{display:none}
  .l-footer-inner{grid-template-columns:1fr}
  .l-footer-bot{flex-direction:column;text-align:center}
  .l-hero-stats{grid-template-columns:repeat(2,1fr)}
  .f-row2{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .auth-role-grid{grid-template-columns:1fr}
}

/* ─── PROFILE PAGE ─── */
.profile-top{background:linear-gradient(135deg,var(--dark2),#2A2520);border-radius:var(--r2);padding:1.5rem;display:flex;align-items:center;gap:1.25rem;margin-bottom:1.25rem;position:relative;overflow:hidden}
.profile-top::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(232,86,10,.2),transparent 65%);pointer-events:none}
.profile-name{font-size:1.1rem;font-weight:900;color:#fff}
.profile-role-tag{background:rgba(255,255,255,.15);color:#fff;font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:var(--r4);margin-top:4px;display:inline-block}
.profile-sub{font-size:.72rem;color:rgba(255,255,255,.5);margin-top:4px}
.verified-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(22,163,74,.2);color:#4ade80;font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:var(--r4);margin-top:6px}
.verified-badge svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}

/* earnings chart placeholder */
.earnings-bar-wrap{display:flex;align-items:flex-end;gap:8px;height:100px;padding:0 4px}
.earnings-bar{flex:1;border-radius:4px 4px 0 0;background:var(--or-lt);transition:height .4s ease;cursor:pointer;position:relative}
.earnings-bar:hover{background:var(--or-md)}
.earnings-bar.active{background:var(--or)}
.earnings-bar-lbl{font-size:.58rem;color:var(--txt3);text-align:center;margin-top:4px;font-weight:600}
.earnings-month{display:flex;flex-direction:column;align-items:center;gap:0;flex:1}
</style>
</head>

<script>

function navigate(screen, sub='home'){
  S.screen = screen;

  render();
  window.scrollTo(0,0);
}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
function toast(msg, type=''){
  const w = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast'+(type?' '+type:'');
  el.textContent = msg;
  w.appendChild(el);
  setTimeout(()=>{el.style.animation='toast-out .3s ease forwards';setTimeout(()=>el.remove(),300)},2600);
}

function renderOTP(){

  const title = `<div class="s20 boldest mb8">${t('verify_phone')}</div>`;

  if(!S.authPhone){
    const otpIcons = ic('phone',16);
    const mailIcon = ic('mail',16);
    return '<div class="auth-card otp-screen">' + back + title +
      '<div class="f-group"><label class="f-label">' + t('enter_phone') + '</label>' +
      '<div class="f-inp-icon"><div class="ic">' + otpIcons + '</div>' +

      '<div class="divider"><span>' + t('or_continue') + '</span></div>' +
      '<button class="soc-btn" onclick="S.authStep=\'form\';S.authPhone=\'\';render()">' + mailIcon + t('email') + '</button>' +
      '<button class="soc-btn" onclick="doGoogleAuth()">' + googleSVG() + t('google_btn') + '</button>' +
      '</div>';
  }

  // Step 2 — enter OTP code
  const otpInputs = [1,2,3,4,5,6].map(function(i){
    return '<input class="otp-inp" id="otp' + i + '" maxlength="1" type="text" inputmode="numeric" ' +
      'oninput="otpInput(this,' + i + ')" onkeydown="otpKey(event,' + i + ')" />';
  }).join('');

  return '<div class="auth-card otp-screen">' + back + title +
    '<div class="phone-display">' + t('otp_sent') + ': <strong>' + S.authPhone + '</strong></div>' +
    '<div class="otp-hint">' + t('enter_otp') + '</div>' +

    '</div>' +

    '</div>';
}

function renderEarnings(){

  const maxVal = Math.max(...e.months);
  const curMonth = new Date().getMonth();
  return `
<div class="dash-h">${t('dash_earnings')}</div>
<div class="stats-grid" style="margin-bottom:1.25rem">

    ${e.months.map((v,i)=>{

function langSw(size=''){
  const sm = size==='small';
  return `<div class="lang-sw" style="${sm?'transform:scale(.85);transform-origin:right':''}">
    <button class="lbtn ${S.lang==='ka'?'on':''}" onclick="changeLang('ka')">ქა</button>
    <button class="lbtn ${S.lang==='ru'?'on':''}" onclick="changeLang('ru')">РУ</button>
    <button class="lbtn ${S.lang==='en'?'on':''}" onclick="changeLang('en')">EN</button>
  </div>`;
}
function changeLang(l){ S.lang=l; document.documentElement.lang=l; render(); }

/* ═══════════════════════════════════════════════
   EVENTS & ACTIONS
═══════════════════════════════════════════════ */
let otpTimer = null;
function bindEvents(){
  // OTP input handling
  if(S.authStep==='otp' && S.authPhone){
    if(otpTimer) clearInterval(otpTimer);
    let sec = 30;
    otpTimer = setInterval(()=>{
      sec--;
      const el = document.getElementById('resendCount');
      const btn = document.getElementById('resendBtn');
      if(el) el.textContent = sec>0 ? `${t('resend_in')} ${sec}s` : '';
      if(btn && sec<=0){ btn.disabled=false; clearInterval(otpTimer); }
    },1000);
  }
}

function doEmailAuth(){
  const email = document.getElementById('a-email')?.value?.trim();
  const pass = document.getElementById('a-pass')?.value;
  const name = document.getElementById('a-name')?.value?.trim();
  if(!email || !pass){ toast('Please fill all fields','red'); return; }
  if(pass.length<6){ toast('Password must be 6+ characters','red'); return; }
  if(S.authTab==='login'){
    // simulate login
    const stored = JSON.parse(localStorage.getItem('fm_users')||'[]');
    const found = stored.find(u=>u.email===email) || {email,name:email.split('@')[0],role:'client',id:Date.now()};
    saveUser(found); toast(t('auth_login')+' ✓','grn'); navigate('dash','home');
  } else {
    if(!name){ toast('Please enter your name','red'); return; }
    S.pendingUser = {email,name,id:Date.now()};
    S.authStep='role'; render();
  }
}

function doGoogleAuth(){
  // Simulate Google auth flow
  const overlay = document.createElement('div');
  overlay.className='modal-bg';
  overlay.innerHTML=`<div class="modal" style="max-width:360px;text-align:center"><div class="modal-body" style="padding:2.5rem 2rem"><div style="margin-bottom:1.5rem">${googleSVG().replace('width="20" height="20"','width="48" height="48"')}</div><div class="s18 boldest mb8">Google Sign In</div><div class="s13 txt2 mb20">Connecting to Google...</div><div class="spinner" style="margin:0 auto"></div></div></div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>{
    overlay.remove();
    if(S.authTab==='login'){
      saveUser({name:'Demo User',email:'demo@gmail.com',role:'client',id:Date.now(),provider:'google'});
      toast('Signed in with Google ✓','grn'); navigate('dash','home');
    } else {
      S.pendingUser={name:'Demo User',email:'demo@gmail.com',id:Date.now(),provider:'google'};
      S.authStep='role'; render();
    }
  },2000);
}

function sendOTP(){
  const ph = document.getElementById('a-phone')?.value?.trim();
  if(!ph||ph.length<9){ toast('Enter valid phone number','red'); return; }
  S.authPhone=ph;
  toast(t('otp_sent')+': '+ph,'');
  render();
}

function otpInput(el,idx){
  el.classList.add('filled');
  if(el.value && idx<6){
    const next = document.getElementById('otp'+(idx+1));
    if(next) next.focus();
  }
  // auto-verify on last digit
  if(idx===6 && el.value){ setTimeout(verifyOTP,300); }
}
function otpKey(e,idx){
  if(e.key==='Backspace' && !e.target.value && idx>1){
    const prev = document.getElementById('otp'+(idx-1));
    if(prev){ prev.value=''; prev.classList.remove('filled'); prev.focus(); }
  }
}
function verifyOTP(){
  let code='';
  for(let i=1;i<=6;i++){ code+=document.getElementById('otp'+i)?.value||''; }
  if(code.length<6){ toast('Enter the 6-digit code','red'); return; }
  // Accept any 6-digit code in demo
  if(S.authTab==='login'){
    saveUser({name:'Phone User',phone:S.authPhone,role:'client',id:Date.now(),provider:'phone'});
    toast('Phone verified ✓','grn'); navigate('dash','home');
  } else {
    S.pendingUser={name:'Phone User',phone:S.authPhone,id:Date.now(),provider:'phone'};
    S.authStep='role'; S.authPhone=''; render();
  }
}
function resendOTP(){ toast(t('otp_sent')+': '+S.authPhone,''); }

function renderRoleSelectOnce(){
  S.authStep='role'; render();
}
function completeRegistration(){
  const u = {...(S.pendingUser||{}),...{role:S.authRole,id:Date.now()}};
  const users = JSON.parse(localStorage.getItem('fm_users')||'[]');
  users.push(u);
  localStorage.setItem('fm_users',JSON.stringify(users));
  saveUser(u);
  S.authStep='form'; S.pendingUser=null;
  toast(t('auth_reg')+' ✓','grn');
  navigate('dash','home');
}

function doLogout(){
  clearUser();
  S.clientOrders=demoOrders();
  toast(t('logout'),'');
  navigate('landing');
}

function acceptJob(id){
  const j = S.jobs.find(x=>x.id===id);
  if(j){
    j.accepted=true;
    S.masterJobs.unshift({id:'m'+Date.now(),title:j.title,svc:j.svc,status:'active',date:j.date,address:j.address,budget:j.budget,client:'Client',progress:0});
    localStorage.setItem('fm_mjobs',JSON.stringify(S.masterJobs));
    toast(t('accept')+': '+j.title,'grn');
    render();
  }
}
function declineJob(id){
  const idx = S.jobs.findIndex(x=>x.id===id);
  if(idx>=0){ S.jobs.splice(idx,1); toast(t('decline'),''); render(); }
}

function submitOrder(){
  const title = document.getElementById('o-title')?.value?.trim();
  const desc = document.getElementById('o-desc')?.value?.trim();
  const addr = document.getElementById('o-addr')?.value?.trim();
  const budget = document.getElementById('o-budget')?.value?.trim();
  const date = document.getElementById('o-date')?.value?.trim()||'ASAP';
  if(!title||!desc){ toast('Please fill Title and Description','red'); return; }
  const svc = S.selectedChips[0]||'carpentry';
  const newO = {id:'o'+Date.now(),title,svc,status:'pending',date,address:addr||'Tbilisi',budget:budget||'TBD',desc,masterName:null,masterRating:null};
  S.clientOrders.unshift(newO);
  saveOrders(S.clientOrders);
  S.selectedChips=[];
  toast(t('order_placed'),'grn');
  navigate('dash','orders');
}

function toggleChip(svc,el){
  if(S.selectedChips.includes(svc)){
    S.selectedChips=S.selectedChips.filter(s=>s!==svc);
    el.classList.remove('sel');
  } else {
    S.selectedChips=[svc]; // single select
    document.querySelectorAll('#svcChips .chip').forEach(c=>c.classList.remove('sel'));
    el.classList.add('sel');
  }
}

function saveProfile(){
  const name=document.getElementById('p-name')?.value;
  const email=document.getElementById('p-email')?.value;
  const phone=document.getElementById('p-phone')?.value;
  const loc=document.getElementById('p-loc')?.value;
  const bio=document.getElementById('p-bio')?.value;
  S.user={...S.user,name,email,phone,location:loc,bio};
  saveUser(S.user);
  toast(t('save')+' ✓','grn');
  render();
}

function filterOrders(status,btn){
  document.querySelectorAll('.chips .chip').forEach(c=>c.classList.remove('sel'));
  btn.classList.add('sel');
  const container=document.getElementById('ordersContainer');
  if(!container) return;
  const filtered=status?S.clientOrders.filter(o=>o.status===status):S.clientOrders;
  container.innerHTML=filtered.map(o=>renderOrderCard(o)).join('')||`<div class="card" style="text-align:center;padding:2rem;color:var(--txt2)">${t('no_orders')}</div>`;
}

function openMobDrawer(){
  document.getElementById('dashSide')?.classList.add('open');
  document.getElementById('mobDrawerBg')?.classList.add('open');
}
function closeMobDrawer(){
  document.getElementById('dashSide')?.classList.remove('open');
  document.getElementById('mobDrawerBg')?.classList.remove('open');
}

window.addEventListener('DOMContentLoaded',()=>{
  // Auto-detect language
  S.lang = detectLang();
  document.documentElement.lang = S.lang;

  // If user is logged in, go to dashboard
  if(S.user){
    S.screen='dash'; S.subscreen='home';
  }
  render();
});

// Handle browser back
window.addEventListener('popstate',()=>{
  if(S.screen!=='landing') navigate('landing');
});
